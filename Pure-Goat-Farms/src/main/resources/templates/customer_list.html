<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Customers Record</title>

    <link rel="icon" type="image/png" th:href="@{/img/title.png}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e8f5e9 100%);
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card-header {
            background: linear-gradient(135deg, #2e7d32, #1b5e20, #2e7d32);
            color: white;
            padding: 20px 30px;
        }
        .btn-light {
            background: rgba(255,255,255,0.9);
            border-radius: 50px;
            padding: 8px 20px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-light:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,255,255,0.3);
        }
        .table thead th {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            color: #1b5e20;
            font-weight: 600;
            border-bottom: 2px solid #2e7d32;
        }
        .btn-group .btn { border-radius: 50px !important; margin: 0 3px; }
        .alert {
            border-radius: 15px;
            border: none;
        }
        .stats-card {
            border-radius: 15px;
            padding: 15px 10px;
            color: white;
            text-align: center;
            transition: all 0.3s ease;
        }
        .stats-card:hover { transform: translateY(-5px); }
        .stats-card i { font-size: 1.5rem; margin-bottom: 5px; }
        .stats-card h6 { font-size: 0.9rem; margin-bottom: 2px; }
        .stats-card h3 { font-size: 1.5rem; margin-bottom: 0; }

        /* Home button style */
        .home-btn {
            background: linear-gradient(135deg, #1976d2, #0d47a1);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 15px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            text-decoration: none;
            height: 100%;
        }
        .home-btn:hover {
            background: linear-gradient(135deg, #0d47a1, #1976d2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(25, 118, 210, 0.4);
            color: white;
        }

        @media (max-width: 768px) {
            /* close-btn style not used, kept for reference */
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Farm Header -->
        <div class="text-center mb-4">
            <i class="fas fa-tree" style="color: #2e7d32; font-size: 24px; margin: 0 10px;"></i>
            <i class="fas fa-goat" style="color: #2e7d32; font-size: 32px; margin: 0 10px;"></i>
            <i class="fas fa-tree" style="color: #2e7d32; font-size: 24px; margin: 0 10px;"></i>
        </div>
        
        <!-- Main Card -->
        <div class="card shadow-lg">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h3 class="mb-0">
                    <i class="fas fa-user-plus me-3"></i>
                    <span>Customers</span>
                </h3>
            </div>

            <div class="card-body">
                <!-- Messages -->
                <div th:if="${msg}" class="alert alert-success alert-dismissible fade show">
                    <i class="fas fa-check-circle me-2"></i> <span th:text="${msg}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${err}" class="alert alert-danger alert-dismissible fade show">
                    <i class="fas fa-exclamation-triangle me-2"></i> <span th:text="${err}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Customers Table -->
                <div class="table-responsive">
                    <table class="table table-hover table-striped align-middle">
                        <thead>
                            <tr>
                                <th>No</th>
                                <th><i class="fas fa-user me-1"></i>Name</th>
                                <th><i class="fas fa-phone me-1"></i>Mobile</th>
                                <th><i class="fas fa-envelope me-1"></i>Email</th>
                                <th><i class="fas fa-map-marker-alt me-1"></i>Address</th>
                                <th><i class="fas fa-cog me-1"></i>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="customer, stat : ${customers}">
                                <td><span class="badge bg-secondary" th:text="${stat.count}">1</span></td>
                                <td class="fw-bold" th:text="${customer.name}">john_doe</td>
                                <td th:text="${customer.mobile}">9876543210</td>
                                <td th:text="${customer.email}">john@example.com</td>
                                <td th:text="${customer.address}">123 Farm Street</td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <!-- Delete form without confirmation -->
                                        <form th:action="@{/customer/delete}" method="post" style="display: inline;">
                                            <input type="hidden" name="name" th:value="${customer.name}">
                                            <button type="submit" class="btn btn-outline-danger btn-sm" 
                                                    title="Delete">
                                                <i class="fas fa-trash-alt"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(customers)}">
                                <td colspan="6" class="text-center py-5 text-muted">
                                    <i class="fas fa-users fa-4x mb-3" style="color: #2e7d32;"></i>
                                    <h5>No Customers Found</h5>
                                    <p>Click "Register New Customer" to add your first customer.</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- Summary Cards with Home Button -->
                <div class="row justify-content-center mt-4">
                    <!-- Total Customers (only if records exist) -->
                    <div class="col-md-2 mb-2" th:if="${!#lists.isEmpty(customers)}">
                        <div class="stats-card bg-success">
                            <i class="fas fa-users"></i>
                            <h6>Total Customers</h6>
                            <h3 th:text="${#lists.size(customers)}">0</h3>
                        </div>
                    </div>
                    <!-- Home Button (always visible) -->
                    <div class="col-md-2 mb-2">
                        <a th:href="@{/}" class="home-btn">
                            <i class="fas fa-home"></i>
                            <span style="font-size: 1.2rem; font-weight: 600;">Close</span>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="card-footer text-center">
                <span><i class="fas fa-clock me-2"></i> Last updated: 
                    <span th:text="${#temporals.format(#temporals.createNow(), 'dd-MM-yyyy HH:mm')}"></span>
                </span>
                <span class="mx-3">|</span>
                <span><i class="fas fa-goat me-2"></i> Pure Goat Farm</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        setTimeout(function() {
            document.querySelectorAll('.alert').forEach(alert => {
                bootstrap.Alert.getOrCreateInstance(alert).close();
            });
        }, 5000);
    </script>
</body>
</html>
