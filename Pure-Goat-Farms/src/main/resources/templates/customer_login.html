<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Customer Login</title>
      <link rel="icon" type="image/png" th:href="@{/img/title.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-image: url('../img/customer_login.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* Close Button – fixed position */
        .close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1001;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        .close-btn:hover {
            background: rgba(0, 0, 0, 0.9);
            transform: scale(1.1);
        }
        .close-btn:active {
            transform: scale(0.95);
        }
        
        .container {
            max-width: 500px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            backdrop-filter: blur(10px);
            margin-top: 2rem;
        }
        
        .card-header {
            background: linear-gradient(135deg, #FF512F 0%, #F09819 100%);
            color: white;
            border: none;
            padding: 1.5rem;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .card-header h3 {
            margin: 0;
            font-weight: 700;
            font-size: 1.8rem;
        }
        
        .card-header i {
            font-size: 1.8rem;
        }
        
        .card-body {
            padding: 2rem;
        }
        
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-label i {
            color: #FF512F;
            font-size: 0.9rem;
        }
        
        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: #FF512F;
            box-shadow: 0 0 0 0.25rem rgba(255, 81, 47, 0.25);
        }
        
        .input-group {
            position: relative;
        }
        
        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #FF512F;
            z-index: 10;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #FF512F 0%, #F09819 100%);
            border: none;
            padding: 0.75rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(240, 152, 25, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #F09819 0%, #FF512F 100%);
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(240, 152, 25, 0.4);
        }
        
        .btn-primary:active {
            transform: translateY(-1px);
        }
        
        .action-links {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e0e0e0;
        }
        
        .action-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #FF512F;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            padding: 0.5rem 1.5rem;
            border-radius: 10px;
            background: rgba(255, 81, 47, 0.1);
        }
        
        .action-link:hover {
            color: #F09819;
            background: rgba(255, 81, 47, 0.2);
            text-decoration: none;
            transform: translateY(-2px);
        }
        
        .action-link i {
            font-size: 1.1rem;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .card {
                margin-top: 1rem;
            }
            
            .card-header {
                padding: 1.25rem;
            }
            
            .card-body {
                padding: 1.5rem;
            }
            
            .close-btn {
                top: 15px;
                right: 15px;
                width: 45px;
                height: 45px;
                font-size: 1.3rem;
            }
        }
        
        @media (max-width: 480px) {
            .card-header h3 {
                font-size: 1.5rem;
            }
            
            .btn-primary {
                padding: 0.65rem;
                font-size: 1rem;
            }
            
            .form-control {
                padding: 0.65rem 0.85rem 0.65rem 2.2rem;
            }
            
            .close-btn {
                top: 10px;
                right: 10px;
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Close Button -->
    <button class="close-btn" onclick="window.history.back()" title="Close">
        <i class="fas fa-times"></i>
    </button>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-sign-in-alt"></i>
                        <h3>Customer Login</h3>
                    </div>
                    <div class="card-body">
                        <form action="/customer_login" method="post">
                            <div class="mb-4">
                                <label for="name" class="form-label">
                                    <i class="fas fa-user"></i> Username
                                </label>
                                <div class="input-group">
                                    <input type="text" class="form-control" id="name" name="name" required 
                                           placeholder="Enter username">
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="pass" class="form-label">
                                    <i class="fas fa-lock"></i> Password
                                </label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="pass" name="pass" required 
                                           placeholder="Enter password">
                                </div>
                            </div>
                            
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="fas fa-sign-in-alt"></i> Login
                                </button>
                            </div>
                        </form>
                        
                        <div class="action-links">
                            <a href="/customer_register" class="action-link">
                                <i class="fas fa-user-plus"></i> Register
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
