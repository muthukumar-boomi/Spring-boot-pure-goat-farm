<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pure Goat</title>
  <link rel="icon" type="image/png" th:href="@{/img/title.png}">
<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
	crossorigin="anonymous">

<style>
body {
	background-image: url('../img/');
	background-size: cover;
	background-repeat: no-repeat;
	background-attachment: fixed;
	background-position: center center;
	min-height: 100vh;
	margin: 0;
	padding: 20px;
	font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
	position: relative;
}

/* Warm earthy overlay */
body::before {
	content: '';
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	background: rgba(90, 70, 50, 0.4); /* warm brown */
	backdrop-filter: blur(2px);
	z-index: 0;
}

/* Close Button – natural stone */
.close-btn {
	position: fixed;
	top: 20px;
	right: 20px;
	background: rgba(130, 100, 70, 0.7); /* earthy taupe */
	color: #f8f2e7;
	border: 2px solid rgba(250, 240, 220, 0.3);
	border-radius: 50%;
	width: 50px;
	height: 50px;
	display: flex;
	align-items: center;
	justify-content: center;
	font-size: 1.5rem;
	cursor: pointer;
	transition: all 0.3s ease;
	z-index: 1001;
	backdrop-filter: blur(4px);
	box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
}
.close-btn:hover {
	background: rgba(150, 120, 90, 0.9);
	transform: scale(1.1) rotate(90deg);
	border-color: #f8f2e7;
}
.close-btn:active {
	transform: scale(0.95);
}

.center-content {
	position: relative;
	z-index: 1;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	min-height: 100vh;
	color: #2f3e2f;
	text-align: center;
	padding: 30px 20px;
	background: rgba(245, 235, 215, 0.2); /* creamy natural tint */
	backdrop-filter: blur(12px);
	border-radius: 60px;
	max-width: 800px;
	margin: 0 auto;
	box-shadow: 0 30px 50px rgba(50, 30, 10, 0.3);
	border: 1px solid rgba(255, 250, 230, 0.2);
}

h1 {
	font-size: 4rem;
	margin-bottom: 20px;
	font-weight: 800;
	color: #1f4f1f; /* deep forest green */
	text-shadow: 2px 2px 8px rgba(0,0,0,0.2);
	letter-spacing: 1.5px;
}

.subtitle {
	font-size: 1.5rem;
	margin-bottom: 40px;
	font-weight: 300;
	color: #f5f0e0; /* soft cream */
	text-shadow: 1px 1px 4px rgba(0,0,0,0.2);
	max-width: 700px;
	line-height: 1.6;
}

h2 {
	color: #e6d5b8; /* warm sand */
	font-size: 2rem;
	margin-bottom: 20px;
	opacity: 0.9;
}

/* Natural gradient buttons */
.custom-button {
	display: inline-flex;
	align-items: center;
	justify-content: center;
	gap: 10px;
	padding: 16px 32px;
	margin: 12px;
	border: none;
	border-radius: 50px;
	font-size: 18px;
	font-weight: 600;
	text-decoration: none;
	color: white;
	box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
	transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
	position: relative;
	overflow: hidden;
	min-width: 220px;
	background-size: 200% auto;
}

.custom-button::before {
	content: '';
	position: absolute;
	top: 0;
	left: -100%;
	width: 100%;
	height: 100%;
	background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
	transition: 0.5s;
}

.custom-button:hover {
	transform: translateY(-5px) scale(1.03);
	background-position: right center;
}

.custom-button:hover::before {
	left: 100%;
}

.custom-button i {
	font-size: 1.2rem;
	transition: transform 0.3s;
}

.custom-button:hover i {
	transform: scale(1.2);
}

/* Register button – sage green */
.custom-button:first-child {
	background: linear-gradient(145deg, #6b8e4c, #4a6741);
}
.custom-button:first-child:hover {
	background: linear-gradient(145deg, #4a6741, #6b8e4c);
}

/* Login button – terracotta */
.custom-button:last-child {
	background: linear-gradient(145deg, #b58a6d, #8b5e3c);
}
.custom-button:last-child:hover {
	background: linear-gradient(145deg, #8b5e3c, #b58a6d);
}

.button-group {
	display: flex;
	flex-direction: row;
	flex-wrap: wrap;
	justify-content: center;
	gap: 20px;
	margin-top: 30px;
}

@media (max-width: 768px) {
	h1 {
		font-size: 2.5rem;
	}
	.subtitle {
		font-size: 1.2rem;
	}
	h2 {
		font-size: 1.5rem;
	}
	.custom-button {
		padding: 14px 28px;
		font-size: 16px;
		min-width: 200px;
	}
	.button-group {
		flex-direction: column;
		align-items: center;
	}
	.close-btn {
		top: 15px;
		right: 15px;
		width: 45px;
		height: 45px;
		font-size: 1.3rem;
	}
}

@media (max-width: 480px) {
	h1 {
		font-size: 2rem;
	}
	.custom-button {
		padding: 12px 24px;
		font-size: 15px;
		min-width: 180px;
	}
	.close-btn {
		top: 10px;
		right: 10px;
		width: 40px;
		height: 40px;
		font-size: 1.2rem;
	}
}
</style>
</head>
<body>
	<!-- Close Button (goes back to previous page) -->
	<button class="close-btn" onclick="window.history.back()" title="Close">
		<i class="fas fa-times"></i>
	</button>

	<div class="center-content">
		<h1 class="main-title">PURE GOAT</h1>
		<div class="subtitle">Premium Stock Management & Sales Platform</div>
		
		<h2>Admin page</h2>
		<div class="button-group">
			
		</div>
	</div>

</body>
</html>
