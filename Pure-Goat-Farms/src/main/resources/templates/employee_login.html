<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="icon" type="image/png" th:href="@{/img/title.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Your existing CSS (same as before) */
        body {
            background-image: url('../img/admin_login.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container { max-width: 500px; }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            backdrop-filter: blur(10px);
            margin-top: 1rem;
        }
        .card-header {
            background: linear-gradient(135deg, #556B2F 0%, #6B8E23 100%);
            color: white;
            border: none;
            padding: 1rem;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .card-header h3 { margin: 0; font-weight: 700; font-size: 1.5rem; }
        .card-header i { font-size: 1.5rem; }
        .card-body { padding: 1.5rem; }
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        .form-label i { color: #556B2F; }
        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            width: 100%;
            opacity: 0.5;
        }
        .form-control:focus {
            border-color: #6B8E23;
            box-shadow: 0 0 0 0.25rem rgba(107, 142, 35, 0.25);
        }
        .input-group {
            position: relative;
            width: fit-content;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }
        .btn-primary {
            background: linear-gradient(135deg, #556B2F 0%, #6B8E23 100%);
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(107, 142, 35, 0.3);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: auto;
            min-width: 150px;
            margin: 0 auto;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #6B8E23 0%, #556B2F 100%);
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(107, 142, 35, 0.4);
        }
        .action-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #e0e0e0;
            flex-wrap: wrap;
        }
        .action-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #556B2F;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            padding: 0.4rem 1.2rem;
            border-radius: 10px;
            background: rgba(85, 107, 47, 0.1);
            font-size: 0.9rem;
        }
        .action-link:hover {
            color: #6B8E23;
            background: rgba(85, 107, 47, 0.2);
            text-decoration: none;
            transform: translateY(-2px);
        }
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .card { margin-top: 0.5rem; }
            .input-group { max-width: 250px; }
        }
        @media (max-width: 480px) {
            .card-header h3 { font-size: 1.3rem; }
            .btn-primary { padding: 0.5rem 1.2rem; font-size: 0.9rem; min-width: 130px; }
            .action-links { flex-direction: column; gap: 8px; }
            .action-link { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-sign-in-alt"></i>
                        <h3>Admin Login</h3>
                    </div>
                    <div class="card-body">
                        <div th:if="${err}" class="alert alert-danger" th:text="${err}"></div>
                        <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>

                        <form id="loginForm" action="/employee_login" method="post">
                            <input type="hidden" name="redirect" th:value="${redirectUrl}" />
                            <!-- Hidden field to store the fetched role -->
                            <input type="hidden" id="role" name="role" />

                            <div class="mb-3">
                                <label for="email" class="form-label">
                                    <i class="fas fa-user"></i> Email Address
                                </label>
                                <div class="input-group">
                                    <input type="email" class="form-control" id="email" name="email" required 
                                           placeholder="Enter Email">
                                </div>
                                <div id="roleMessage" class="text-center small mt-2"></div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="pass" class="form-label">
                                    <i class="fas fa-lock"></i> Password
                                </label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="pass" name="pass" required 
                                           placeholder="Enter password">
                                </div>
                            </div>
                            
                            <div class="text-center mt-3">
                                <button type="submit" class="btn-primary" style="border:none;" id="loginBtn" disabled>
                                    <i class="fas fa-sign-in-alt"></i> Login
                                </button>
                            </div>
                        </form>
                        
                        <div class="action-links">
                            <a href="/" class="action-link"><i class="fas fa-home"></i> Home</a>
                            <a href="/employee_register" class="action-link"><i class="fas fa-user-plus"></i> Register</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const emailInput = document.getElementById('email');
        const roleHidden = document.getElementById('role');
        const loginBtn = document.getElementById('loginBtn');
        const roleMsg = document.getElementById('roleMessage');

        emailInput.addEventListener('blur', function() {
            let email = this.value.trim();
            if (email === '') {
                roleMsg.innerHTML = '';
                loginBtn.disabled = true;
                return;
            }

            // Fetch role from backend
            fetch(`/getRoleByEmail?email=${encodeURIComponent(email)}`)
                .then(response => response.text())
                .then(role => {
                    if (role === 'notfound') {
                        roleMsg.innerHTML = '<span class="text-danger">❌ Email not registered</span>';
                        loginBtn.disabled = true;
                        roleHidden.value = '';
                    } else if (role.toLowerCase() === 'admin') {
                        roleMsg.innerHTML = '<span class="text-success">✅ Admin account – you can login</span>';
                        loginBtn.disabled = false;
                        roleHidden.value = 'admin';
                    } else {
                        roleMsg.innerHTML = '<span class="text-danger">⛔ Access denied. Only Admin can login.</span>';
                        loginBtn.disabled = true;
                        roleHidden.value = '';
                    }
                })
                .catch(err => {
                    console.error(err);
                    roleMsg.innerHTML = '<span class="text-danger">Error fetching role</span>';
                    loginBtn.disabled = true;
                });
        });
    </script>
</body>
</html>
